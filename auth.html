<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Sign Up — MasterDeveloper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">MasterDeveloper</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-right">
        <a href="services.html" class="btn-nav">Get Started</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html" class="mobile-link">Home</a>
      <a href="services.html" class="mobile-link">Services</a>
    </div>
  </nav>

  <!-- AUTH PAGE -->
  <main class="auth-page">
    <div class="auth-bg">
      <div class="grid-overlay"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
    </div>

    <div class="auth-container">
      <div class="auth-brand">
        <div class="nav-logo" style="justify-content:center;margin-bottom:8px">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">MasterDeveloper</span>
        </div>
        <p class="auth-brand-sub">Your premium dev partner</p>
      </div>

      <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" id="loginTab">Login</button>
          <button class="auth-tab" data-tab="signup" id="signupTab">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
              <input type="password" id="loginPassword" placeholder="Your password" required />
              <button type="button" class="toggle-pw" data-target="loginPassword">👁</button>
            </div>
          </div>
          <div class="form-row-space">
            <label class="checkbox-label">
              <input type="checkbox" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary btn-auth">Login to Dashboard</button>
          <div class="auth-divider"><span>or continue with</span></div>
          <div class="social-btns">
            <button type="button" class="social-btn">
              <img src="https://www.google.com/favicon.ico" alt="Google" width="18" /> Google
            </button>
            <button type="button" class="social-btn discord-btn">
              🎮 Discord
            </button>
          </div>
          <p class="auth-switch">Don't have an account? <a href="#" id="toSignup">Sign up</a></p>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signupForm">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="John" required />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
              <input type="password" id="signupPassword" placeholder="Min. 8 characters" required />
              <button type="button" class="toggle-pw" data-target="signupPassword">👁</button>
            </div>
            <div class="password-strength" id="pwStrength">
              <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
              <span id="strengthLabel">Strength</span>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat password" required />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" required /> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
          </div>
          <button type="submit" class="btn-primary btn-auth">Create Account</button>
          <div class="auth-divider"><span>or continue with</span></div>
          <div class="social-btns">
            <button type="button" class="social-btn">
              <img src="https://www.google.com/favicon.ico" alt="Google" width="18" /> Google
            </button>
            <button type="button" class="social-btn discord-btn">
              🎮 Discord
            </button>
          </div>
          <p class="auth-switch">Already have an account? <a href="#" id="toLogin">Login</a></p>
        </form>

      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
